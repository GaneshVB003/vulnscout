services:
  - type: web
    name: vulnscout
    env: python
    buildCommand: pip install -r requirements.txt && cd ../frontend && npm install && npm run build
    startCommand: cd api && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: FRONTEND_DIST
        value: "../frontend/dist"
    rootDirectory: api